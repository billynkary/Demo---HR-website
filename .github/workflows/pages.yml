# 將靜態網站部署到 GitHub Pages（取得可分享的 https 連結）
# 啟用方式：Repo → Settings → Pages → Build and deployment → Source 選「GitHub Actions」
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site folder
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css js _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
